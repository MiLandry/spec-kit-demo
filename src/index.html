<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Editor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <div class="panel">
      <h1>Employees</h1>
      <div id="employee-list" class="employee-list"></div>
    </div>

    <div class="panel">
      <h2>Editor</h2>
      <form id="employee-form" class="employee-form">
        <div class="field">
          <label for="employee-name">Name</label>
          <input id="employee-name" name="name" type="text" />
        </div>
        <div class="field">
          <label for="employee-title">Title</label>
          <input id="employee-title" name="title" type="text" />
        </div>
        <button id="save-button" type="button">Save changes</button>
      </form>
    </div>
  </main>

  <script src="employee-state.js"></script>
  <script src="app.js"></script>
</body>
</html>
